spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hlrattor}
    username: ${DB_USERNAME:hlrattor}
    password: ${DB_PASSWORD:hlrattor}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: ${DB_MIN_IDLE:2}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  session:
    store-type: none

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  error:
    include-message: never
    include-binding-errors: never

logging:
  level:
    org.springframework.security: INFO
    com.hlrattor: DEBUG

# Application version — injected at build time via Maven resource filtering
# Updated automatically by: make set-version V=x.y.z
application:
  version: @project.version@
