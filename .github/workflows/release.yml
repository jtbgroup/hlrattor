name: Release
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'   # e.g. v1.2.3
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # jtbgroup/hlrattor
jobs:
  # ── Build & push Docker image ──────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to push to ghcr.io
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      image:   ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Extract version from tag (v1.2.3 → 1.2.3)
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (multi-arch support)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Produce tags: 1.2.3, v1.2.3, 1.2, latest — and OCI labels
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern=v{{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers between runs to speed up builds
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          build-args: |
            APP_VERSION=${{ steps.version.outputs.VERSION }}

  # ── Create GitHub Release ──────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write   # required to create a Release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for release notes

      - name: Create Release with auto-generated notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ github.ref_name }}
          name:       Release ${{ github.ref_name }}
          generate_release_notes: true   # auto-changelog from commits
          body: |
            ## Docker image
            ```
            docker pull ghcr.io/${{ github.repository }}:${{ needs.build-and-push.outputs.version }}
            ```
            or with v-prefix
            ```
            docker pull ghcr.io/${{ github.repository }}:v${{ needs.build-and-push.outputs.version }}
            ```
            or always latest
            ```
            docker pull ghcr.io/${{ github.repository }}:latest
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}