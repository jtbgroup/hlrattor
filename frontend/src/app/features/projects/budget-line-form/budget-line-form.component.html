<h2 mat-dialog-title>{{ isEdit ? 'Edit' : 'Add' }} Budget Line</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="budget-form">

    <mat-form-field appearance="outline">
      <mat-label>Type *</mat-label>
      <mat-select formControlName="type">
        <mat-option *ngFor="let t of types" [value]="t">{{ t }}</mat-option>
      </mat-select>
      <mat-error *ngIf="form.get('type')?.hasError('required')">Type is required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Amount (€) *</mat-label>
      <input matInput type="number" formControlName="amount" />
      <mat-error *ngIf="form.get('amount')?.hasError('required')">Amount is required</mat-error>
      <mat-error *ngIf="form.get('amount')?.hasError('min')">Amount must be positive</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Date *</mat-label>
      <input matInput [matDatepicker]="datePicker" formControlName="date" />
      <mat-datepicker-toggle matSuffix [for]="datePicker"></mat-datepicker-toggle>
      <mat-datepicker #datePicker></mat-datepicker>
      <mat-error *ngIf="form.get('date')?.hasError('required')">Date is required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>PORD Reference</mat-label>
      <input matInput formControlName="pordReference" />
    </mat-form-field>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="submit()" [disabled]="form.invalid">
    {{ isEdit ? 'Save' : 'Add' }}
  </button>
</mat-dialog-actions>
